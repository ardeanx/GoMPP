services:
    gompp-api:
        build:
            context: ..
            dockerfile: deployments/Dockerfile.api
        ports:
            - "8080:8080"
        env_file:
            - ../.env
        environment:
            # Override docker-specific values (these take precedence over env_file)
            GOMPP_DATABASE_HOST: gompp-db
            GOMPP_STORAGE_BASEPATH: /data/media
            GOMPP_TRANSCODE_TEMPDIR: /data/temp
        volumes:
            - gompp-media:/data/media
            - gompp-temp:/data/temp
        depends_on:
            gompp-db:
                condition: service_healthy
        restart: unless-stopped

    gompp-web:
        build:
            context: ..
            dockerfile: deployments/Dockerfile.web
        ports:
            - "3000:3000"
        env_file:
            - ../.env
        environment:
            NEXT_PUBLIC_API_URL: "http://gompp-api:8080/api/v1"
        depends_on:
            - gompp-api
        restart: unless-stopped

    gompp-nginx:
        image: nginx:1.27-alpine
        ports:
            - "80:80"
        volumes:
            - ./nginx/gompp.conf:/etc/nginx/conf.d/default.conf:ro
            - gompp-media:/data/media:ro
        depends_on:
            - gompp-api
            - gompp-web
        restart: unless-stopped

    gompp-db:
        image: postgres:16-alpine
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: gompp
            POSTGRES_PASSWORD: gompp
            POSTGRES_DB: gompp
        volumes:
            - gompp-db-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U gompp"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    # --- Observability ---

    prometheus:
        image: prom/prometheus:v2.53.0
        ports:
            - "9090:9090"
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
            - prometheus-data:/prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=30d"
        depends_on:
            - gompp-api
        restart: unless-stopped

    grafana:
        image: grafana/grafana:11.1.0
        ports:
            - "3001:3000"
        environment:
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: gompp
            GF_USERS_ALLOW_SIGN_UP: "false"
        volumes:
            - ./grafana/provisioning:/etc/grafana/provisioning:ro
            - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
            - grafana-data:/var/lib/grafana
        depends_on:
            - prometheus
        restart: unless-stopped

volumes:
    gompp-db-data:
    gompp-media:
    gompp-temp:
    prometheus-data:
    grafana-data:
