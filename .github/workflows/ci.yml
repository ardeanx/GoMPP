name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
            - name: Go vet
              run: go vet ./...
            - name: golangci-lint
              uses: golangci/golangci-lint-action@v6
              with:
                  version: latest

    test:
        name: Test
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: gompp
                    POSTGRES_PASSWORD: gompp
                    POSTGRES_DB: gompp
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U gompp"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        env:
            GOMPP_DATABASE_HOST: localhost
            GOMPP_DATABASE_PORT: 5432
            GOMPP_DATABASE_USER: gompp
            GOMPP_DATABASE_PASSWORD: gompp
            GOMPP_DATABASE_NAME: gompp
            GOMPP_DATABASE_SSLMODE: disable
            GOMPP_JWT_SECRET: ci-test-secret-do-not-use-in-prod
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
            - name: Run tests
              run: go test ./... -v -count=1 -race -coverprofile=coverage.out
            - name: Upload coverage
              uses: actions/upload-artifact@v4
              with:
                  name: coverage
                  path: coverage.out

    benchmark:
        name: Benchmark
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
            - name: Run benchmarks
              run: |
                  go test ./internal/handler/ -bench Benchmark -benchmem -count=3
                  go test ./internal/middleware/ -bench Benchmark -benchmem -count=3

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint, test]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
            - name: Build binary
              run: go build -ldflags="-s -w" -o bin/gompp ./server
            - name: Upload binary
              uses: actions/upload-artifact@v4
              with:
                  name: gompp-binary
                  path: bin/gompp

    docker:
        name: Docker Build
        runs-on: ubuntu-latest
        needs: [build]
        steps:
            - uses: actions/checkout@v4
            - name: Build API image
              run: docker build -f deployments/Dockerfile.api -t gompp-api:${{ github.sha }} .
            - name: Build Web image
              run: docker build -f deployments/Dockerfile.web -t gompp-web:${{ github.sha }} .

    security:
        name: Security Scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
            - name: govulncheck
              run: |
                  go install golang.org/x/vuln/cmd/govulncheck@latest
                  govulncheck ./...
