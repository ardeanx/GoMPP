name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        name: Build & Release
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - goos: linux
                      goarch: amd64
                    - goos: linux
                      goarch: arm64
                    - goos: darwin
                      goarch: amd64
                    - goos: darwin
                      goarch: arm64
                    - goos: windows
                      goarch: amd64
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
            - name: Build
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
              run: |
                  VERSION=${GITHUB_REF_NAME}
                  BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                  EXT=""
                  if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
                  CGO_ENABLED=0 go build \
                    -ldflags="-s -w -X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}" \
                    -o "gompp-${GOOS}-${GOARCH}${EXT}" \
                    ./server
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: gompp-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: gompp-*

    publish:
        name: Publish Release
        runs-on: ubuntu-latest
        needs: [release]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true
            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: dist/gompp-*
